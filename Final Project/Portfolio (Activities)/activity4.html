<!DOCTYPE html>
<head>
    <title>Activity 4</title>
</head>
<body style="font-family: Arial; background-color: #f2f2f2;">

    <h2 style="color: rgba(167, 5, 5, 0.849);">User Information</h2>

    <form action="" method="post">
        <table style="border: 1px solid black; border-collapse: collapse; background-color: white;" cellpadding="10">

            <tr>
                <td style="color: black; font-weight: bold;">First Name:</td>
                <td>
                    <input type="text" name="firstname" required
                        style="border: 1px solid gray; padding: 5px;">
                </td>
            </tr>

            <tr>
                <td style="color: black; font-weight: bold;">Last Name:</td>
                <td>
                    <input type="text" name="lastname" required
                        style="border: 1px solid gray; padding: 5px;">
                </td>
            </tr>

            <tr>
                <td style="color: black; font-weight: bold;">Age:</td>
                <td>
                    <input type="text" name="age" required
                        style="border: 1px solid gray; padding: 5px;">
                </td>
            </tr>

            <tr>
                <td style="color: black; font-weight: bold;">Gender:</td>
                <td style="color: gray;">
                    <input type="radio" name="gender" value="male"> Male<br>
                    <input type="radio" name="gender" value="female"> Female<br>
                    <input type="radio" name="gender" value="other"> Other
                </td>
            </tr>

            <tr>
                <td style="color: black; font-weight: bold;">Hobbies:</td>
                <td style="color: gray;">
                    <input type="checkbox" name="hobby" value="reading"> Reading<br>
                    <input type="checkbox" name="hobby" value="traveling"> Traveling<br>
                    <input type="checkbox" name="hobby" value="gaming"> Gaming<br>
                    <input type="checkbox" name="hobby" value="cooking"> Cooking<br>
                    <input type="checkbox" name="hobby" value="sports"> Sports<br>
                    <input type="checkbox" name="hobby" value="dancing"> Dancing
                </td>
            </tr>

            <tr>
                <td style="color: black; font-weight: bold;">Year Level:</td>
                <td>
                    <select name="year-level"
                        style="border: 1px solid gray; padding: 5px;">
                        <option>1st Year</option>
                        <option>2nd Year</option>
                        <option>3rd Year</option>
                        <option>4th Year</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td colspan="2" style="text-align: center;">
                    <button type="submit"
                        style="background-color: rgba(167, 5, 5, 0.849); color: white; border: none; padding: 8px 15px;">
                        Submit
                    </button>

                    <button type="reset"
                        style="background-color: gray; color: white; border: none; padding: 8px 15px;">
                        Clear
                    </button>
                </td>
            </tr>

        </table>
    </form>

</body>
