<!DOCTYPE html>
<html>
  <title>Heart</title>

  <body style="background-color: #83c9f4;">
    <style>
     .heart {
       position: relative;
       width: 100px;
       height: 90px;
       background: red;
       transform: rotate(-45deg);
       margin: 100px auto;
      }

      .heart::before,
      .heart::after {
        content: "";
        position: absolute;
        width: 100px;
        height: 90px;
        background: red;
        border-radius: 50%;
      }

      .heart::before {
        top: -50px;
        left: 0;
      }

      .heart::after {
        left: 50px;
        top: 0;
      }
    </style>

    <div class="heart"></div>
  </body>
</html>
